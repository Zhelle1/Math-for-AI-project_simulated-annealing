<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulated Annealing Visualization</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            touch-action: manipulation;
        }

        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .toggle-btn {
            background: #ffffff;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .toggle-btn:hover { background: #ecf0f1; border-color: #95a5a6; }

        h1 { margin-bottom: 10px; color: #2c3e50; text-align: center; }
        p { margin-top: 0; color: #7f8c8d; text-align: center; }
        
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }

        /* 修复后的视觉容器：高度自适应手机屏幕 */
        .visual-area {
            width: 100%;
            height: 50vh; /* 默认占据屏幕的一半高度 */
            max-height: 400px; /* 电脑上最高不超过 400px */
            min-height: 280px; /* 手机上最矮不低于 280px */
            position: relative;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #plot3D {
            width: 100%;
            height: 100%;
            display: none; 
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            align-items: flex-start;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 220px; 
        }

        input[type="range"] { width: 100%; cursor: pointer; }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button.action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }

        #startBtn { background: #3498db; color: white; }
        #startBtn:hover { background: #2980b9; }
        #resetBtn { background: #e74c3c; color: white; }
        #resetBtn:hover { background: #c0392b; }

        .stats {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 10px;
            margin-top: 20px;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
        }

        .stat-box {
            background: #eaf2f8;
            padding: 10px 10px;
            border-radius: 6px;
            flex: 1;
            min-width: 130px; 
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="modeToggleBtn" class="toggle-btn">🔲 切换至 3D 向量模式</button>
        <button id="langToggleBtn" class="toggle-btn">🌐 English</button>
    </div>

    <h1 id="pageTitle">模拟退火算法</h1>
    <p id="pageDesc">调整参数，观察粒子如何跳出局部最优，寻找全局最低点。</p>

    <div class="container">
        <div class="visual-area" id="visualArea">
            <canvas id="saCanvas"></canvas>
            <div id="plot3D"></div>
        </div>

        <div class="stats">
            <div class="stat-box"><span id="lblCurIter">当前迭代:</span> <br><span id="iterDisplay" style="color: #2980b9;">0</span></div>
            <div class="stat-box"><span id="lblTemp">当前温度:</span> <br><span id="tempDisplay">100.00</span></div>
            <div class="stat-box"><span id="lblCost">当前能量:</span> <br><span id="currentCostDisplay">0.00</span></div>
            <div class="stat-box"><span id="lblBest">历史最低:</span> <br><span id="bestCostDisplay" style="color: #d35400;">0.00</span></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="maxIter"><span id="lblMaxIter">最大迭代次数:</span> <span id="maxIterVal">1000</span></label>
                <input type="range" id="maxIter" min="100" max="5000" step="100" value="1000">
            </div>

            <div class="control-group">
                <label for="initialTemp"><span id="lblInitTemp">初始温度:</span> <span id="tempVal">100</span></label>
                <input type="range" id="initialTemp" min="10" max="200" step="10" value="100">
            </div>
            
            <div class="control-group">
                <label for="coolingRate"><span id="lblRate">冷却速率:</span> <span id="rateVal">0.990</span></label>
                <input type="range" id="coolingRate" min="0.800" max="0.999" step="0.001" value="0.990">
            </div>

            <div class="control-group">
                <label for="initialX"><span id="lblInitX">初始位置 (X):</span> <span id="xVal">0.0</span></label>
                <input type="range" id="initialX" min="-10" max="10" step="0.5" value="0">
            </div>
            
            <div class="control-group" id="yControlGroup" style="display: none;">
                <label for="initialY"><span id="lblInitY">初始位置 (Y):</span> <span id="yVal">0.0</span></label>
                <input type="range" id="initialY" min="-10" max="10" step="0.5" value="0">
            </div>

            <div class="btn-group">
                <button id="startBtn" class="action-btn">开始搜索</button>
                <button id="resetBtn" class="action-btn">重置</button>
            </div>
        </div>
    </div>

    <script>
        // ---------------- 语言包配置 ----------------
        const dict = {
            zh: {
                title: "模拟退火算法",
                desc: "调整参数，观察粒子如何跳出局部最优，寻找全局最低点。",
                lblCurIter: "当前迭代:",
                lblTemp: "当前温度:",
                lblCost: "当前能量:",
                lblBest: "历史最低:",
                lblMaxIter: "最大迭代次数:",
                lblInitX: "初始位置 (X):",
                lblInitY: "初始位置 (Y):",
                lblInitTemp: "初始温度:",
                lblRate: "冷却速率:",
                btnStart: "开始搜索",
                btnPause: "暂停搜索",
                btnResume: "继续搜索",
                btnComplete: "搜索完成",
                btnReset: "重置",
                langText: "🌐 English",
                modeText2D: "🔲 切换至 3D 向量模式",
                modeText3D: "➖ 切换至 2D 标量模式"
            },
            en: {
                title: "Simulated Annealing Algorithm",
                desc: "Adjust parameters and observe how the particle escapes local optima.",
                lblCurIter: "Current Iter:",
                lblTemp: "Current Temp:",
                lblCost: "Current Energy:",
                lblBest: "Best Energy:",
                lblMaxIter: "Max Iterations:",
                lblInitX: "Initial Pos (X):",
                lblInitY: "Initial Pos (Y):",
                lblInitTemp: "Initial Temp:",
                lblRate: "Cooling Rate:",
                btnStart: "Start Search",
                btnPause: "Pause Search",
                btnResume: "Resume Search",
                btnComplete: "Search Complete",
                btnReset: "Reset",
                langText: "🌐 中文",
                modeText2D: "🔲 Switch to 3D Vector Mode",
                modeText3D: "➖ Switch to 2D Scalar Mode"
            }
        };

        let currentLang = 'zh';
        let is3DMode = false;

        function applyLanguage() {
            const t = dict[currentLang];
            document.getElementById('pageTitle').textContent = t.title;
            document.getElementById('pageDesc').textContent = t.desc;
            document.getElementById('lblCurIter').textContent = t.lblCurIter;
            document.getElementById('lblTemp').textContent = t.lblTemp;
            document.getElementById('lblCost').textContent = t.lblCost;
            document.getElementById('lblBest').textContent = t.lblBest;
            document.getElementById('lblMaxIter').textContent = t.lblMaxIter;
            document.getElementById('lblInitX').textContent = t.lblInitX;
            document.getElementById('lblInitY').textContent = t.lblInitY;
            document.getElementById('lblInitTemp').textContent = t.lblInitTemp;
            document.getElementById('lblRate').textContent = t.lblRate;
            document.getElementById('resetBtn').textContent = t.btnReset;
            document.getElementById('langToggleBtn').textContent = t.langText;
            document.getElementById('modeToggleBtn').textContent = is3DMode ? t.modeText3D : t.modeText2D;

            if (temperature < 0.01 || currentIteration >= maxIterations) {
                document.getElementById('startBtn').textContent = t.btnComplete;
            } else if (isAnimating) {
                document.getElementById('startBtn').textContent = t.btnPause;
            } else if (currentIteration > 0) {
                document.getElementById('startBtn').textContent = t.btnResume;
            } else {
                document.getElementById('startBtn').textContent = t.btnStart;
            }
        }

        document.getElementById('langToggleBtn').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
        });

        document.getElementById('modeToggleBtn').addEventListener('click', () => {
            is3DMode = !is3DMode;
            document.getElementById('saCanvas').style.display = is3DMode ? 'none' : 'block';
            document.getElementById('plot3D').style.display = is3DMode ? 'block' : 'none';
            document.getElementById('yControlGroup').style.display = is3DMode ? 'flex' : 'none';
            // 切换模式时重新测量并渲染
            handleResize();
            reset(); 
        });

        // ---------------- 核心算法与数据 ----------------
        const canvas = document.getElementById('saCanvas');
        const ctx = canvas.getContext('2d');
        const visualArea = document.getElementById('visualArea');
        const xSlider = document.getElementById('initialX');
        const ySlider = document.getElementById('initialY');
        const tempSlider = document.getElementById('initialTemp');
        const rateSlider = document.getElementById('coolingRate');
        const iterSlider = document.getElementById('maxIter');
        
        const tempDisplay = document.getElementById('tempDisplay');
        const currentCostDisplay = document.getElementById('currentCostDisplay');
        const bestCostDisplay = document.getElementById('bestCostDisplay');
        const iterDisplay = document.getElementById('iterDisplay');
        const startBtn = document.getElementById('startBtn');

        function f2D(x) { return (x * x) / 10 - 4 * Math.cos(x); }
        function f3D(x, y) { return (x * x + y * y) / 10 - 4 * Math.cos(x) - 4 * Math.cos(y); }

        const bounds = { min: -10, max: 10 };
        let currentX, currentY, currentCost;
        let bestX, bestY, bestCost;
        let temperature, coolingRate;
        let currentIteration = 0, maxIterations = 1000;
        let isAnimating = false;
        let animationId;
        let isPlotlyInitialized = false;

        // ---------------- 动态画布重置方案 ----------------
        // 这个函数保证画布分辨率永远和实际显示尺寸一致，解决小球变椭圆的问题
        function handleResize() {
            canvas.width = visualArea.clientWidth;
            canvas.height = visualArea.clientHeight;
            
            if (is3DMode) {
                if (isPlotlyInitialized) {
                    Plotly.Plots.resize('plot3D');
                }
            } else {
                draw2D();
            }
        }
        window.addEventListener('resize', handleResize);

        // ---------------- 2D 渲染 ----------------
        function mapX(x) { return (x - bounds.min) / (bounds.max - bounds.min) * canvas.width; }
        function mapY(y) { return canvas.height - ((y + 6) / 24 * canvas.height); }

        function draw2D() {
            // 如果画布宽度为0说明还没初始化好，跳过
            if(canvas.width === 0) return; 

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#eee"; ctx.beginPath();
            ctx.moveTo(0, mapY(0)); ctx.lineTo(canvas.width, mapY(0));
            ctx.moveTo(mapX(0), 0); ctx.lineTo(mapX(0), canvas.height); ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 2;
            for (let px = 0; px <= canvas.width; px++) {
                let x = bounds.min + (px / canvas.width) * (bounds.max - bounds.min);
                let y = f2D(x);
                if (px === 0) ctx.moveTo(px, mapY(y)); else ctx.lineTo(px, mapY(y));
            }
            ctx.stroke();

            // 绘制最优解和小球
            ctx.beginPath(); ctx.arc(mapX(bestX), mapY(bestCost), 8, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(211, 84, 0, 0.5)"; ctx.fill();
            ctx.strokeStyle = "#d35400"; ctx.lineWidth = 2; ctx.stroke();

            ctx.beginPath(); ctx.arc(mapX(currentX), mapY(currentCost), 6, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c"; ctx.fill();
        }

        // ---------------- 3D 渲染 (Plotly) ----------------
        function initPlotly() {
            let xData = [], yData = [], zData = [];
            for (let i = bounds.min; i <= bounds.max; i += 0.5) {
                let xRow = [], yRow = [], zRow = [];
                for (let j = bounds.min; j <= bounds.max; j += 0.5) {
                    xRow.push(i); yRow.push(j); zRow.push(f3D(i, j));
                }
                xData.push(xRow); yData.push(yRow); zData.push(zRow);
            }

            const surface = { type: 'surface', x: xData, y: yData, z: zData, colorscale: 'Viridis', opacity: 0.85, showscale: false };
            const bestPt = { type: 'scatter3d', mode: 'markers', x: [bestX], y: [bestY], z: [bestCost], marker: { color: 'orange', size: 8, symbol: 'circle-open', line: {width: 4} }, name: 'Best' };
            const currPt = { type: 'scatter3d', mode: 'markers', x: [currentX], y: [currentY], z: [currentCost], marker: { color: 'red', size: 6 }, name: 'Current' };

            const layout = {
                margin: { l: 0, r: 0, b: 0, t: 0 },
                scene: { camera: { eye: {x: 1.5, y: 1.5, z: 1.2} }, xaxis: {title: 'X'}, yaxis: {title: 'Y'}, zaxis: {title: 'Cost'} },
                showlegend: false
            };

            Plotly.newPlot('plot3D', [surface, bestPt, currPt], layout, {displayModeBar: false, responsive: true});
            isPlotlyInitialized = true;
        }

        function updatePlotly() {
            if(!isPlotlyInitialized) return;
            Plotly.restyle('plot3D', { 'x': [[bestX]], 'y': [[bestY]], 'z': [[bestCost]] }, 1);
            Plotly.restyle('plot3D', { 'x': [[currentX]], 'y': [[currentY]], 'z': [[currentCost]] }, 2);
        }

        // ---------------- UI 交互逻辑 ----------------
        iterSlider.oninput = () => {
            document.getElementById('maxIterVal').textContent = iterSlider.value;
            if (!isAnimating) {
                maxIterations = parseInt(iterSlider.value);
                applyLanguage(); 
            }
        };

        xSlider.oninput = () => {
            document.getElementById('xVal').textContent = parseFloat(xSlider.value).toFixed(1);
            cancelAnimationFrame(animationId); isAnimating = false;
            
            currentX = parseFloat(xSlider.value);
            currentY = is3DMode ? parseFloat(ySlider.value) : 0; 
            currentCost = is3DMode ? f3D(currentX, currentY) : f2D(currentX);
            
            bestX = currentX; bestY = currentY; bestCost = currentCost;
            temperature = parseFloat(tempSlider.value); coolingRate = parseFloat(rateSlider.value);
            currentIteration = 0;

            applyLanguage(); updateStats();
            is3DMode ? updatePlotly() : draw2D();
        };

        ySlider.oninput = () => {
            document.getElementById('yVal').textContent = parseFloat(ySlider.value).toFixed(1);
            cancelAnimationFrame(animationId); isAnimating = false;
            
            currentX = parseFloat(xSlider.value);
            currentY = parseFloat(ySlider.value); 
            currentCost = f3D(currentX, currentY);
            
            bestX = currentX; bestY = currentY; bestCost = currentCost;
            temperature = parseFloat(tempSlider.value); coolingRate = parseFloat(rateSlider.value);
            currentIteration = 0;

            applyLanguage(); updateStats();
            updatePlotly();
        };

        tempSlider.oninput = () => {
            document.getElementById('tempVal').textContent = tempSlider.value;
            if (!isAnimating) {
                temperature = parseFloat(tempSlider.value);
                applyLanguage(); updateStats();
            }
        };

        rateSlider.oninput = () => {
            document.getElementById('rateVal').textContent = rateSlider.value;
            if (!isAnimating) coolingRate = parseFloat(rateSlider.value);
        };

        function updateStats() {
            iterDisplay.textContent = currentIteration;
            tempDisplay.textContent = temperature.toFixed(2);
            currentCostDisplay.textContent = currentCost.toFixed(2);
            bestCostDisplay.textContent = bestCost.toFixed(2);
        }

        function reset() {
            cancelAnimationFrame(animationId); isAnimating = false;
            
            currentX = parseFloat(xSlider.value);
            currentY = is3DMode ? parseFloat(ySlider.value) : 0; 
            currentCost = is3DMode ? f3D(currentX, currentY) : f2D(currentX);
            
            bestX = currentX; bestY = currentY; bestCost = currentCost;
            
            temperature = parseFloat(tempSlider.value); 
            coolingRate = parseFloat(rateSlider.value);
            maxIterations = parseInt(iterSlider.value);
            currentIteration = 0;

            applyLanguage(); updateStats();
            
            if (is3DMode) {
                if(!isPlotlyInitialized) initPlotly();
                else updatePlotly();
            } else {
                draw2D();
            }
        }

        function step() {
            if (temperature < 0.01 || currentIteration >= maxIterations) {
                isAnimating = false; 
                startBtn.textContent = dict[currentLang].btnComplete; 
                return;
            }

            currentIteration++;

            let stepSize = (temperature / 25) + 0.1; 
            
            let newX = currentX + (Math.random() * 2 - 1) * stepSize;
            newX = Math.max(bounds.min, Math.min(bounds.max, newX)); 
            
            let newY = currentY;
            let newCost;

            if (is3DMode) {
                newY = currentY + (Math.random() * 2 - 1) * stepSize;
                newY = Math.max(bounds.min, Math.min(bounds.max, newY));
                newCost = f3D(newX, newY);
            } else {
                newCost = f2D(newX);
            }

            let deltaE = newCost - currentCost;

            if (deltaE < 0 || Math.random() < Math.exp(-deltaE / temperature)) {
                currentX = newX; currentY = newY; currentCost = newCost;
            }

            if (currentCost < bestCost) {
                bestX = currentX; bestY = currentY; bestCost = currentCost;
            }

            temperature *= coolingRate;
            updateStats();
            
            if (is3DMode) {
                updatePlotly();
            } else {
                draw2D();
            }

            if (isAnimating) {
                setTimeout(() => { requestAnimationFrame(step); }, is3DMode ? 20 : 0);
            }
        }

        startBtn.addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false; cancelAnimationFrame(animationId);
                startBtn.textContent = dict[currentLang].btnResume;
            } else {
                if (currentIteration >= maxIterations || temperature < 0.01) return;
                isAnimating = true; startBtn.textContent = dict[currentLang].btnPause;
                coolingRate = parseFloat(rateSlider.value); 
                step();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', reset);
        
        // 首次加载时立刻校准屏幕大小并重置
        handleResize();
        reset();
    </script>
</body>
</html>
